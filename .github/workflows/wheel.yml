name: wheel

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "**.md"
      - "test/**"

permissions:
  contents: write
  actions: read

jobs:
  build_macos:
    strategy:
      matrix:
        platform:
          - name: macos-26_arm64
            runs_on: macos-26
          - name: macos-15_arm64
            runs_on: macos-15
        python_version:
          - "3.14"
          - "3.14t"
          - "3.13"
          - "3.13t"
          - "3.12"
    runs-on: ${{ matrix.platform.runs_on }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          python-version: ${{ matrix.python_version }}

      - name: Build wheel
        run: uv build --wheel --out-dir wheelhouse
      - name: Install wheel and run tests
        run: |
          uv pip install wheelhouse/*.whl --reinstall
          NO_UV_SYNC=1 uv run --group test pytest --timeout=60
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform.name }}_python-${{ matrix.python_version }}
          path: wheelhouse/*.whl

  build_ubuntu:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: ubuntu-24.04_x86_64
            runs_on: ubuntu-24.04
          - name: ubuntu-24.04_arm64
            runs_on: ubuntu-24.04-arm
          - name: ubuntu-22.04_x86_64
            runs_on: ubuntu-22.04
          - name: ubuntu-22.04_arm64
            runs_on: ubuntu-22.04-arm
        python_version:
          - "3.14"
          - "3.14t"
          - "3.13"
          - "3.13t"
          - "3.12"
    runs-on: ${{ matrix.platform.runs_on }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          python-version: ${{ matrix.python_version }}

      - name: Build wheel
        run: uv build --wheel
      - name: Install wheel and run tests
        run: |
          uv pip install dist/*.whl --reinstall
          NO_UV_SYNC=1 uv run --group test pytest --timeout=60
      - name: Repair wheel with auditwheel
        shell: bash
        run: |
          uvx auditwheel repair dist/*.whl --strip --only-plat
      - name: Upload Repaired Wheels
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform.name }}_python-${{ matrix.python_version }}
          path: wheelhouse/*.whl

  build_windows:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-2025_x86_64
            runs_on: windows-2025
        python_version:
          - "3.14"
          - "3.14t"
          - "3.13"
          - "3.13t"
          - "3.12"
    runs-on: ${{ matrix.platform.runs_on }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Setup Python via uv
        shell: bash
        run: |
          uv python pin ${{ matrix.python_version }}
      - name: Build wheel
        run: uv build --wheel --out-dir wheelhouse
      - name: Install wheel and run tests
        shell: bash
        run: |
          uv pip install wheelhouse/*.whl --reinstall
          NO_UV_SYNC=1 uv run --group test pytest --timeout=60
      - name: Upload Wheels
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform.name }}_python-${{ matrix.python_version }}
          path: wheelhouse/*.whl

  publish_wheel:
    if: contains(github.ref, 'tags/202')
    needs:
      - build_ubuntu
      - build_macos
      - build_windows
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: ubuntu-24.04_x86_64
          - name: ubuntu-24.04_arm64
          - name: ubuntu-22.04_x86_64
          - name: ubuntu-22.04_arm64
          # - name: macos-26_arm64
          - name: macos-15_arm64
          - name: windows-2025_x86_64
        python_version:
          - "3.14"
          - "3.14t"
          - "3.13"
          - "3.13t"
          - "3.12"
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.platform.name }}_python-${{ matrix.python_version }}
          path: wheelhouse/
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse

  create-release:
    if: contains(github.ref, 'tags/202')
    needs:
      - build_ubuntu
      - build_macos
      - build_windows
    runs-on: ubuntu-slim
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
      - name: Create release files list
        run: |
          find artifacts -name "*.whl" -type f > release_files.txt
      - name: Create GitHub Release
        run: |
          if [[ "${{ github.ref }}" == *"dev"* ]]; then
            gh release create ${{ github.ref_name }} \
              --title "${{ github.ref_name }}" \
              --prerelease \
              $(cat release_files.txt | xargs)
          else
            gh release create ${{ github.ref_name }} \
              --title "${{ github.ref_name }}" \
              $(cat release_files.txt | xargs)
          fi
        env:
          GH_TOKEN: ${{ github.token }}
